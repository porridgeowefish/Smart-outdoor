services:
  postgres:
    image: postgres:16
    container_name: smart_outdoor_postgres
    environment:
      POSTGRES_USER: smart_outdoor
      POSTGRES_PASSWORD: smart_outdoor_dev_password
      POSTGRES_DB: smart_outdoor
    ports:
      - "5432:5432"
    volumes:
      - smart_outdoor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_outdoor -d smart_outdoor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smart_outdoor_postgres_data:
