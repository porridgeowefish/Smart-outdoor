services:
  postgres:
    image: postgres:16
    container_name: smart_outdoor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smart_outdoor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_outdoor_dev_password}
      POSTGRES_DB: smart_outdoor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart_outdoor} -d smart_outdoor"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  backend:
    build: ./backend
    container_name: smart_outdoor_backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage
    networks:
      - app_net

  nginx:
    build: ./user-frontend-new
    container_name: smart_outdoor_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - app_net

volumes:
  postgres_data:
  storage_data:

networks:
  app_net:
